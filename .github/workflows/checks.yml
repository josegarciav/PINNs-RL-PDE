name: Checks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Check coverage (>=80%)
        if: matrix.python-version == '3.11'
        run: uv run pytest tests/ --cov=src --cov-report=term-missing --cov-fail-under=80

  lint:
    name: Lint & format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install dev dependencies
        run: uv sync --frozen --group dev

      - name: Run black
        run: uv run black --check src/ tests/

      - name: Run ruff
        run: uv run ruff check src/ tests/

      - name: Check docstrings (pydocstyle)
        run: uv run pydocstyle src/

      - name: Verify uv.lock is up to date
        run: uv lock --check

  commit-message:
    name: Conventional commits
    runs-on: ubuntu-latest
    if: |
      !contains(github.actor, '[bot]') &&
      !contains(github.event.head_commit.message, 'Jules') &&
      !contains(github.event.head_commit.message, 'Co-Authored-By: Claude')

    steps:
      - uses: actions/checkout@v4

      - name: Validate commit messages
        uses: gsactions/commit-message-checker@v2
        with:
          pattern: '^(feat|fix|docs|style|refactor|perf|test|chore)(\(.+\))?: .+'
          flags: 'i'
          error: 'Commit message must follow Conventional Commits: feat|fix|docs|style|refactor|perf|test|chore'
