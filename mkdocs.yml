site_name: pinnrl
site_description: Physics-Informed Neural Networks with RL-based adaptive sampling for solving PDEs
site_url: https://josegarciav.github.io/PINNs-RL-PDE
repo_url: https://github.com/josegarciav/PINNs-RL-PDE
repo_name: josegarciav/PINNs-RL-PDE

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false
            separate_signature: true
            heading_level: 2

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Start Here: start_here.md
    - Installation & Setup: setup.md
    - Dashboard Guide: dashboard.md
  - Architecture: ARCHITECTURE.md
  - Sampling Strategies: sampling_strategies.md
  - API Reference:
    - Overview: api/index.md
    - Configuration: api/config.md
    - Neural Networks: api/neural_networks.md
    - PDEs: api/pdes.md
    - Training: api/training.md
    - RL Agent: api/rl.md
    - Utilities: api/utils.md
  - Roadmap: roadmap.md
